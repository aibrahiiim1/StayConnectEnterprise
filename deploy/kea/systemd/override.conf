# Drop-in for kea-dhcp4-server.service (install to
# /etc/systemd/system/kea-dhcp4-server.service.d/override.conf).
#
# The stock Kea unit ships with NO Restart= policy, so a Kea crash left guest
# DHCP dead until a manual restart. Make it recover automatically and never
# permanently fail. netd re-reconciles Kea's config on its own, so a bare
# restart is safe.
[Unit]
StartLimitIntervalSec=0

[Service]
Restart=on-failure
RestartSec=2
