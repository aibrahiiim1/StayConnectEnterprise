{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": ["br-lan/10.10.0.1"],
      "dhcp-socket-type": "raw"
    },

    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/run/kea/kea4-ctrl-socket"
    },

    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv",
      "lfc-interval": 3600
    },

    "expired-leases-processing": {
      "reclaim-timer-wait-time": 10,
      "flush-reclaimed-timer-wait-time": 25,
      "hold-reclaimed-time": 3600,
      "max-reclaim-leases": 100,
      "max-reclaim-time": 250,
      "unwarned-reclaim-cycles": 5
    },

    "renew-timer":  900,
    "rebind-timer": 1800,
    "valid-lifetime": 3600,

    "option-data": [
      {
        "name": "domain-name",
        "data": "stayconnect.local"
      },
      {
        "name": "domain-name-servers",
        "data": "10.10.0.1"
      },
      // RFC 8910 captive-portal URI (option 114). Makes iOS 14+/macOS 11+/
      // Android 11+/Windows 11 auto-open the portal on join, bypassing
      // Private Relay / encrypted-DNS probe problems. MUST stay a plain-HTTP
      // URL straight to portald — HTTPS or the Caddy vhost breaks the flow
      // (cert trust / 308 redirect). Clients pick it up on lease renewal only.
      {
        "name": "v4-captive-portal",
        "data": "http://10.10.0.1:8380/"
      }
    ],

    "subnet4": [
      {
        "id": 1,
        "subnet": "10.10.0.0/24",
        "interface": "br-lan",
        "pools": [
          { "pool": "10.10.0.100 - 10.10.0.250" }
        ],
        "option-data": [
          { "name": "routers",             "data": "10.10.0.1" },
          { "name": "domain-name-servers", "data": "10.10.0.1" },
          { "name": "broadcast-address",   "data": "10.10.0.255" }
        ]
      }
    ],

    "loggers": [
      {
        "name": "kea-dhcp4",
        "output_options": [
          { "output": "/var/log/kea/kea-dhcp4.log", "flush": true }
        ],
        "severity": "INFO",
        "debuglevel": 0
      }
    ]
  }
}
