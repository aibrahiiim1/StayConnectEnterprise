# StayConnect gateway forwarding + hardening
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# Don't let the LAN side advertise the WAN as a redirect target.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Drop martians on the LAN side.
net.ipv4.conf.all.log_martians = 1

# TIME_WAIT reuse — busy portal does a lot of short-lived TCP.
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15

# Connection tracking for many guests.
net.netfilter.nf_conntrack_max = 262144
