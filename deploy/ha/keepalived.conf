! StayConnect — active/passive HA (phase 5.5)
!
! Deploy two appliances at one site running this config. One file per box;
! flip `state MASTER` → `state BACKUP` and lower `priority` on the second box.
!
! VRID (51) and auth_pass must match between the pair. Keep VRID unique per
! site if you ever run more than one pair on the same L2.

vrrp_script chk_scd {
    ! 200 OK from scd's health endpoint proves it's reachable locally.
    script "/usr/bin/curl -sf --unix-socket /run/stayconnect/scd.sock http://unix/v1/health"
    interval 2
    fall     2
    rise     2
    timeout  1
}

vrrp_instance VI_GUEST {
    state              MASTER              ! BACKUP on the second box
    interface          <guest-lan-iface>   ! e.g. eth1 — the LAN serving guests
    virtual_router_id  51
    priority           150                 ! 100 on backup; higher wins
    advert_int         1                   ! 1s VRRP adverts

    authentication {
        auth_type PASS
        auth_pass <shared-16char-secret>
    }

    virtual_ipaddress {
        <guest-gateway-vip>/<prefix>        ! e.g. 10.10.0.1/24 — guest gateway
    }

    track_script {
        chk_scd
    }

    ! Preemption: default (on). When master recovers, it takes VIP back.
    ! Set `nopreempt` if you prefer stickiness, but then manual failback.

    notify_master /usr/local/bin/stayconnect-ha-notify master
    notify_backup /usr/local/bin/stayconnect-ha-notify backup
    notify_fault  /usr/local/bin/stayconnect-ha-notify fault
}
