# StayConnect — conntrackd config (phase 5.5)
#
# Purpose: sync nf_conntrack entries between the HA pair so a VRRP
# failover doesn't drop guest TCP/UDP flows. Multicast syncs are the
# simplest path on a dedicated sync VLAN; for production consider UDP
# unicast if the pair spans L3.
#
# Install on both boxes with the same file; swap IPv4_interface /
# IPv4_address pair per-box to match the local sync interface.

General {
    HashSize    32768
    HashLimit   131072
    LogFile     on
    LockFile    /var/lock/conntrackd.lock
    UNIX {
        Path /var/run/conntrackd.sock
        Backlog 20
    }
    SocketBufferSize        262142
    SocketBufferSizeMaxGrown 655355
    Filter From Kernelspace {
        Protocol Accept {
            TCP
            UDP
            ICMP
            IPv6-ICMP
        }
        Address Ignore {
            # Never sync conntrack for the management net.
            IPv4_address 127.0.0.1
        }
    }
}

Sync {
    Mode FTFW {
        ResendQueueSize 131072
        ACKWindowSize   300
        DisableExternalCache Off
        StartupResync On
    }
    # Use a dedicated sync VLAN. Multicast group + port can be anything
    # unused on that link.
    Multicast Default {
        IPv4_address 225.0.0.50
        Group 3780
        IPv4_interface <sync-iface>      # e.g. eth2
        Interface       <sync-iface>
        SndSocketBuffer 24985600
        RcvSocketBuffer 24985600
        Checksum on
    }
}
