# Shared appliance-health scratch dir on tmpfs. Holds the per-service adaptive
# backoff trackers + liveness heartbeats (non-sensitive restart counters). Mode
# 0777 so every service user (root/stayconnect/caddy/unbound) can write its own
# tracker while edged reads them all. Created early at boot by systemd-tmpfiles
# so sandboxed services (edged/portald, ProtectSystem=strict) can list it in
# ReadWritePaths=. Install to /etc/tmpfiles.d/stayconnect-health.conf.
d /run/stayconnect 0755 root root -
d /run/stayconnect/health 0777 root root -
