# Auto-provisioned Prometheus datasource. Grafana picks this up on boot.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Both services run with network_mode=host, so Grafana reaches
    # Prometheus via the host's loopback.
    url: http://127.0.0.1:9090
    uid: prometheus
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
