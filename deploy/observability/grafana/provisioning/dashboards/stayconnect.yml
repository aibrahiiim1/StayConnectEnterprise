# Auto-provision every dashboard JSON in /var/lib/grafana/dashboards.
# Grafana scans on boot; drop-in new files without restarting by
# running `docker compose restart stayconnect-grafana`.

apiVersion: 1

providers:
  - name: stayconnect
    orgId: 1
    folder: StayConnect
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
