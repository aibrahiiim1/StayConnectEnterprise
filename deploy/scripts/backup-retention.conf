# stayconnect backup retention policy (/etc/stayconnect/backup-retention.conf)
# Tuned per artifact type by rollback value vs storage risk. Edit + the next
# cleanup run (post-deploy or the daily timer) picks it up.

# Binary rollback backups kept PER binary name (ctrlapi / scd / edged / acctd ...).
# 5 gives several known-good rollback targets without unbounded growth.
KEEP_BINARIES=5

# UI release dirs kept per app, ON TOP OF the always-protected current + previous
# (so a rollback to previous is always possible).
KEEP_RELEASES=5

# Database dumps: the newest full backup is NEVER deleted regardless; keep this
# many total for point-in-time recovery headroom.
KEEP_DB=7

# Config *.bak* files (netplan, /etc/stayconnect).
KEEP_CONFIG=3

# Disk-usage thresholds (% of / used) that raise warning / critical alerts.
DISK_WARN=80
DISK_CRIT=90
