# StayConnect — recursive DNS for guests on the LAN.
# Installed at /etc/unbound/unbound.conf.d/stayconnect.conf

server:
    verbosity: 1
    num-threads: 2
    interface: 10.10.0.1
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    access-control: 127.0.0.0/8 allow
    access-control: 10.10.0.0/24 allow
    access-control: 0.0.0.0/0 refuse

    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-referral-path: yes
    use-caps-for-id: no

    prefetch: yes
    prefetch-key: yes
    cache-min-ttl: 30
    cache-max-ttl: 86400

    # Serve portal FQDN authoritatively so captive flows resolve locally.
    local-zone: "stayconnect.local." static
    local-data: "portal.stayconnect.local. IN A 10.10.0.1"
    local-data: "captive.stayconnect.local. IN A 10.10.0.1"
    local-data: "gw.stayconnect.local. IN A 10.10.0.1"

    # Never leak internal reverse lookups.
    local-zone: "10.in-addr.arpa." static
    local-data-ptr: "10.10.0.1 gw.stayconnect.local."
