# Drop-in for unbound.service (install to
# /etc/systemd/system/unbound.service.d/override.conf).
#
# The stock unit already has Restart=on-failure but no backoff/start-limit
# guarantee. Pin a bounded backoff and disable the start-rate limiter so guest
# DNS always recovers automatically after a crash or a dependency delay.
[Unit]
StartLimitIntervalSec=0

[Service]
Restart=on-failure
RestartSec=2
# Adaptive crash-loop backoff before each (re)start — backoff-only mode.
ExecStartPre=/opt/stayconnect/bin/svc-run unbound
